name: Sonde cotes

on:
  workflow_dispatch:
    inputs:
      fixture_id:
        description: "ID fixture API-Football (optionnel)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Sonder
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FIXTURE_ID: ${{ inputs.fixture_id }}
        run: python probe_odds.py
      - name: Publier
        run: |
          git config user.name "collecte-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "Resultat sonde cotes" || echo "rien"
          git push
