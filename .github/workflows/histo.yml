name: Cotes historiques

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * 1"

permissions:
  contents: write

jobs:
  histo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Backfill cotes historiques
        run: python histo_odds.py
      - name: Publier
        run: |
          git config user.name "collecte-bot"
          git config user.email "bot@users.noreply.github.com"
          git add donnees_histo.js
          git commit -m "MAJ cotes historiques (football-data.co.uk)" || echo "Rien a committer"
          git push
