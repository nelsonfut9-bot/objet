name: Collecte automatique

on:
  schedule:
    # GitHub saute/retarde souvent les crons gratuits : on multiplie les tentatives (toutes les 15 min).
    - cron: "5 * * * *"
    - cron: "20 * * * *"
    - cron: "35 * * * *"
    - cron: "50 * * * *"
  workflow_dispatch:
  # declenchement externe fiable (ex: cron-job.org) via l'API GitHub repository_dispatch
  repository_dispatch:
    types: [collecte]

permissions:
  contents: write

# jamais deux collectes en meme temps (evite les conflits de push)
concurrency:
  group: collecte-objet
  cancel-in-progress: false

jobs:
  collecte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Lancer la collecte
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python collecte_auto.py
      - name: Publier les donnees
        run: |
          git config user.name "collecte-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "MAJ donnees" || echo "Rien a committer"
          git pull --rebase --autostash || true
          git push
