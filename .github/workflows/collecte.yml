name: Collecte automatique

on:
  schedule:
    # GitHub sature les crons a pile l'heure : on vise des minutes decalees,
    # 3 tentatives par heure pour fiabiliser le declenchement.
    - cron: "7 * * * *"
    - cron: "27 * * * *"
    - cron: "47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

# jamais deux collectes en meme temps (evite les conflits de push)
concurrency:
  group: collecte-objet
  cancel-in-progress: false

jobs:
  collecte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Lancer la collecte
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python collecte_auto.py
      - name: Publier les donnees
        run: |
          git config user.name "collecte-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "MAJ donnees" || echo "Rien a committer"
          git pull --rebase --autostash || true
          git push
